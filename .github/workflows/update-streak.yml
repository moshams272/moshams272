name: Update GitHub Streak Cache

on:
  schedule:
    # This script runs every day at midnight (UTC)
    - cron: '0 0 * * *'
  # Allows you to manually trigger the workflow from the Actions tab
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update Cache Buster in README
        run: |
          # This line searches for "&v=" followed by any numbers, 
          # and replaces the number with the current Unix timestamp (in seconds)
          sed -i -E 's/(&v=[0-9]+)/\&v='$(date +%s)'/g' README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # Only commit and push if there are actual changes in the file
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update streak stats cache"
          git push
